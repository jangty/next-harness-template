# CI — 피드백 사다리의 세 번째 레이어(분 단위). pre-commit 과 같은 게이트를 원격에서 재확인.
# PostToolUse(ms) → pre-commit(s) → CI(min) → 사람(h)
#
# guard 잡은 의존성이 없어 골격 단계에서도 즉시 통과한다.
# verify 잡은 package.json + npm 스크립트(typecheck/lint/test/build)가 생기면 작동한다.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # 가드 훅 회귀 — 비밀/산출물/파괴적 차단이 깨지지 않았는지(의존성 없음, 항상 작동).
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/hooks/guard-pretooluse.check.mjs

  # 검증 게이트 — pre-commit 과 동일(typecheck·lint·test·build). 스택이 붙으면 활성화.
  verify:
    runs-on: ubuntu-latest
    if: ${{ hashFiles('package.json') != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test --if-present
      - run: npm run build --if-present
